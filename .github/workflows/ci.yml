name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest tests/ -v --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run smoke tests
        run: poetry run pytest tests/ -m smoke -v --no-cov --tb=short

      - name: Verify examples
        run: |
          poetry run python examples/generate_xml.py
          poetry run python examples/account_management.py
          poetry run python examples/services_facade.py
          poetry run python examples/validate_identifiers.py
          poetry run python examples/validation_service.py
          poetry run python examples/compliance_cleansing.py
          poetry run python examples/all_message_types.py
          poetry run python examples/data_sources.py
          poetry run python examples/rest_api_client.py

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff check
        run: poetry run ruff check acmt001/

      - name: Black check
        run: poetry run black --check acmt001/ tests/

      - name: Mypy
        run: poetry run mypy acmt001/

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Bandit
        run: poetry run bandit -r acmt001/ -c pyproject.toml || poetry run bandit -r acmt001/ -s B101

  servers:
    name: ${{ matrix.package }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [acmt001-mcp, acmt001-lsp]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core + companion package
        run: |
          python -m pip install --upgrade pip
          pip install .                                   # core acmt001
          pip install ./packages/${{ matrix.package }}    # companion + its deps
          pip install pytest ruff

      - name: Lint companion package
        run: ruff check packages/${{ matrix.package }}/

      - name: Test companion package
        run: pytest packages/${{ matrix.package }}/tests -q
